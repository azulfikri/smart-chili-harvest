version: "3.8"

services:
  backend:
    build: ./backend
    container_name: smart-chili-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Persist uploaded images & SQLite database across restarts
      - backend_uploads:/app/uploads
      - backend_db:/app/data
    environment:
      - PORT=8000
    # Health check for monitoring
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  backend_uploads:
  backend_db:

#cloud-config

# ============================================================
# Smart Chili Harvest - Cloud-Init Installation Script
# Target: Ubuntu 22.04+ VPS (CloudeHost, 2 CPU / 2GB RAM / 20GB)
# ============================================================

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - ufw

runcmd:
  # ---- 1. Install Docker Engine (official method) ----
  - curl -fsSL https://get.docker.com | sh

  # ---- 2. Install Docker Compose plugin ----
  - apt-get install -y docker-compose-plugin

  # ---- 3. Enable and start Docker ----
  - systemctl enable docker
  - systemctl start docker

  # ---- 4. Configure firewall (UFW) ----
  - ufw allow OpenSSH
  - ufw allow 8000/tcp
  - ufw --force enable

  # ---- 5. Clone repository ----
  - git clone https://github.com/azulfikri/Smart-Chili-Harvest.git /opt/smart-chili-harvest

  # ---- 6. Setup environment ----
  - cp /opt/smart-chili-harvest/.env.example /opt/smart-chili-harvest/.env

  # ---- 7. Build and start containers ----
  - cd /opt/smart-chili-harvest && docker compose up -d --build

  # ---- 8. Add swap (recommended for 2GB RAM + YOLOv8 inference) ----
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

final_message: |
  ========================================
  Smart Chili Harvest - Setup Selesai!
  Backend API: http://$(hostname -I | awk '{print $1}'):8000
  Swagger Docs: http://$(hostname -I | awk '{print $1}'):8000/docs
  ========================================
